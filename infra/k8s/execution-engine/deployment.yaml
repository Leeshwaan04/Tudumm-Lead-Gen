apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-engine
  namespace: tudumm
  labels:
    app: execution-engine
    app.kubernetes.io/part-of: tudumm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: execution-engine
  template:
    metadata:
      labels:
        app: execution-engine
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [execution-engine]
                topologyKey: kubernetes.io/hostname
      # docker.sock requires running on nodes with docker daemon
      nodeSelector:
        tudumm.io/node-role: executor
      tolerations:
        - key: tudumm.io/executor
          operator: Exists
          effect: NoSchedule
      containers:
        - name: execution-engine
          image: tudumm/execution-engine:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
              name: http
          securityContext:
            privileged: true  # required for Docker-in-Docker
          envFrom:
            - configMapRef:
                name: tudumm-config
            - secretRef:
                name: tudumm-secrets
          env:
            - name: PORT
              value: "8002"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
      terminationGracePeriodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: execution-engine
  namespace: tudumm
  labels:
    app: execution-engine
spec:
  type: ClusterIP
  selector:
    app: execution-engine
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: execution-engine-hpa
  namespace: tudumm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: execution-engine
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600   # 10 min — allow runs to finish
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
