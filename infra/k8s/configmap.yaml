apiVersion: v1
kind: ConfigMap
metadata:
  name: tudumm-config
  namespace: tudumm
  labels:
    app.kubernetes.io/part-of: tudumm
data:
  # Service discovery
  AUTH_SERVICE_URL: "http://auth-service:8001"
  EXECUTION_SERVICE_URL: "http://execution-engine:8002"
  BILLING_SERVICE_URL: "http://billing-service:8003"
  STORAGE_SERVICE_URL: "http://storage-service:8004"
  MARKETPLACE_SERVICE_URL: "http://marketplace-service:8005"
  SCHEDULING_SERVICE_URL: "http://scheduling-service:8006"

  # Infrastructure
  REDIS_URL: "redis://redis-master:6379"
  RABBITMQ_URL: "amqp://tudumm:tudumm@rabbitmq:5672/"
  TEMPORAL_HOST: "temporal-frontend:7233"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  CLICKHOUSE_DSN: "http://clickhouse:8123"
  MINIO_ENDPOINT: "minio:9000"

  # Application settings
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT_AUTH: "8001"
  PORT_EXECUTION: "8002"
  PORT_BILLING: "8003"
  PORT_STORAGE: "8004"
  PORT_MARKETPLACE: "8005"
  PORT_SCHEDULING: "8006"
  PORT_GATEWAY: "4000"
  PORT_WEB: "3000"

  # Feature flags
  FEATURE_MARKETPLACE_ENABLED: "true"
  FEATURE_PROXY_ENABLED: "true"
  FEATURE_AI_CREDITS_ENABLED: "true"
  FEATURE_WORKFLOW_DAG_ENABLED: "true"
  FEATURE_TEMPORAL_ENABLED: "true"

  # Limits
  MAX_CONCURRENT_RUNS_PER_WORKSPACE: "10"
  MAX_RUN_DURATION_SECONDS: "3600"
  MAX_ACTOR_MEMORY_MB: "4096"
  DEFAULT_PROXY_POOL_SIZE: "50"

  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_VERSION: "1.0.0"
  NEXT_TELEMETRY_DISABLED: "1"
