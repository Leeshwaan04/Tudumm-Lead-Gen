apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduling-service
  namespace: tudumm
  labels:
    app: scheduling-service
    app.kubernetes.io/part-of: tudumm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scheduling-service
  template:
    metadata:
      labels:
        app: scheduling-service
    spec:
      containers:
        - name: scheduling-service
          image: tudumm/scheduling-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8006
              name: http
          envFrom:
            - configMapRef:
                name: tudumm-config
            - secretRef:
                name: tudumm-secrets
          env:
            - name: PORT
              value: "8006"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: scheduling-service
  namespace: tudumm
  labels:
    app: scheduling-service
spec:
  type: ClusterIP
  selector:
    app: scheduling-service
  ports:
    - name: http
      port: 8006
      targetPort: 8006
      protocol: TCP
