apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
  namespace: tudumm
  labels:
    app: storage-service
    app.kubernetes.io/part-of: tudumm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: storage-service
  template:
    metadata:
      labels:
        app: storage-service
    spec:
      containers:
        - name: storage-service
          image: tudumm/storage-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
              name: http
          envFrom:
            - configMapRef:
                name: tudumm-config
            - secretRef:
                name: tudumm-secrets
          env:
            - name: PORT
              value: "8004"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8004
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
  namespace: tudumm
  labels:
    app: storage-service
spec:
  type: ClusterIP
  selector:
    app: storage-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004
      protocol: TCP
