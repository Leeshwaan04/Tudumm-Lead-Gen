[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/marketplace-service/Dockerfile"
buildContext = "apps/marketplace-service"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.envVars]]
name = "PORT"
value = "8080"
