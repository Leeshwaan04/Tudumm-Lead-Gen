[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
buildContext = "."

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.envVars]]
name = "PORT"
value = "3000"

[[deploy.envVars]]
name = "NODE_ENV"
value = "production"
