name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  publish-sdk:
    name: Publish @tudumm/sdk to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @tudumm/sdk build

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          pnpm --filter @tudumm/sdk version $VERSION --no-git-tag-version

      - name: Publish to npm
        run: pnpm --filter @tudumm/sdk publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-cli:
    name: Build CLI — ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: tudumm-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: tudumm-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: tudumm-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: tudumm-darwin-arm64
          - goos: windows
            goarch: amd64
            asset_name: tudumm-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/cli/go.sum

      - name: Build CLI binary
        working-directory: apps/cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../../dist/${{ matrix.asset_name }} \
            ./cmd/tudumm

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-sdk, build-cli]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tudumm ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/tudumm-linux-amd64/tudumm-linux-amd64
            dist/tudumm-linux-arm64/tudumm-linux-arm64
            dist/tudumm-darwin-amd64/tudumm-darwin-amd64
            dist/tudumm-darwin-arm64/tudumm-darwin-arm64
            dist/tudumm-windows-amd64.exe/tudumm-windows-amd64.exe
